name: Assemble touch upload

on:
  push:
    branches:
      - agent/touch-trackpad
    paths:
      - '.crown-upload/**'
      - '.github/workflows/assemble-touch-upload.yml'

permissions:
  contents: write

jobs:
  assemble:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/touch-trackpad
          fetch-depth: 0
      - name: Assemble index.html
        shell: bash
        run: |
          set -euo pipefail
          cat .crown-upload/part-*.b64 | base64 --decode | gzip --decompress > index.html
          grep -q "Phase 1 MVP 0.3.0" index.html
          grep -q "touchGesture" index.html
          grep -q "2本指" index.html
      - name: Commit assembled file
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .crown-upload .github/workflows/assemble-touch-upload.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .crown-upload .github/workflows/assemble-touch-upload.yml
          git commit -m "improve trackpad and touch controls"
          git push origin HEAD:agent/touch-trackpad
