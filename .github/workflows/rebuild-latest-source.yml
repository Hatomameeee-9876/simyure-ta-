name: Rebuild latest playable source

on:
  pull_request:
    branches:
      - main
    types: [opened, reopened, ready_for_review]

permissions:
  contents: write

jobs:
  rebuild:
    if: github.head_ref == 'agent/phase2-logistics' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase2-logistics
          fetch-depth: 0

      - name: Rebuild Phase 2 from the last healthy source
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import subprocess

          BASE = 'c89dae70cbadb55ed23f5d55e574e562cdda8429'
          html = subprocess.check_output(['git', 'show', f'{BASE}:index.html']).decode('utf-8')

          def replace_once(old, new, label):
              global html
              if old not in html:
                  raise SystemExit(f'Patch marker not found: {label}')
              html = html.replace(old, new, 1)

          def replace_all(old, new, label):
              global html
              count = html.count(old)
              if count == 0:
                  raise SystemExit(f'Patch marker not found: {label}')
              html = html.replace(old, new)
              print(f'{label}: replaced {count}')

          def replace_line(prefix, transform, label):
              global html
              lines = html.splitlines()
              matches = [i for i, line in enumerate(lines) if line.startswith(prefix)]
              if len(matches) != 1:
                  raise SystemExit(f'{label}: expected one line, found {len(matches)}')
              i = matches[0]
              lines[i] = transform(lines[i])
              html = '\n'.join(lines) + ('\n' if html.endswith('\n') else '')

          replace_once('辺境の冠 — Phase 1 MVP', '辺境の冠 — Phase 2 Logistics', 'document title')
          replace_once('<div class="brand"><strong>辺境の冠</strong><small>Phase 1 MVP 0.3.0</small></div>', '<div class="brand"><strong>辺境の冠</strong><small>Phase 2 Logistics 0.4.0</small></div>', 'brand version')
          replace_once("GAME_VERSION:'0.3.0', SAVE_VERSION:3", "GAME_VERSION:'0.4.0', SAVE_VERSION:4", 'game version')
          replace_once("STORAGE_KEY:'frontier-crown-phase1-save-v3'", "STORAGE_KEY:'frontier-crown-phase2-save-v4'", 'storage key')

          mobile_css = r'''
    @supports (height:100dvh) {
      html,body,#app { height:100dvh; }
    }
    @media (max-width:860px), (pointer:coarse) {
      #topbar { padding-top:max(6px,env(safe-area-inset-top)); }
      #bottombar { padding-bottom:max(6px,env(safe-area-inset-bottom)); }
      #resources { max-width:calc(100vw - 16px); }
      .sidebar { max-height:100%; overscroll-behavior:contain; }
    }
'''
          replace_once('  </style>', mobile_css + '  </style>', 'mobile safe-area CSS')

          city_marker = '<dt>王国警戒</dt><dd id="city-alert">0%</dd><dt>生存</dt><dd id="city-years">0年</dd></dl>\n        <h2 class="panel-title">在庫</h2>'
          city_replacement = '<dt>王国警戒</dt><dd id="city-alert">0%</dd><dt>生存</dt><dd id="city-years">0年</dd></dl>\n        <h2 class="panel-title">物流</h2><dl class="stat-grid"><dt>物流効率</dt><dd id="logistics-efficiency">100%</dd><dt>輸送能力</dt><dd id="logistics-capacity">0</dd><dt>輸送需要</dt><dd id="logistics-demand">0</dd><dt>接続道路</dt><dd id="logistics-roads">0</dd></dl>\n        <h2 class="panel-title">在庫</h2>'
          replace_once(city_marker, city_replacement, 'logistics UI')

          clinic = "clinic:Object.freeze({id:11,name:'簡易診療所',icon:'診',workers:3,cost:{wood:80,stone:30,gold:20},color:'#d6d2b8',description:'寒さ・飢餓・災害による死亡を軽減します。'}) });"
          clinic_and_cart = "clinic:Object.freeze({id:11,name:'簡易診療所',icon:'診',workers:3,cost:{wood:80,stone:30,gold:20},color:'#d6d2b8',description:'寒さ・飢餓・災害による死亡を軽減します。'}),\n      cartshed:Object.freeze({id:12,name:'荷車小屋',icon:'車',workers:4,cost:{wood:90,stone:20,gold:15},color:'#a76f42',description:'荷車と御者を確保し、道路物流の輸送能力を大きく増やします。'}) });"
          replace_once(clinic, clinic_and_cart, 'cartshed building')

          replace_once('buildingRuntime:new Map(),agents:[],accumulator:0', 'buildingRuntime:new Map(),agents:[],carts:[],cartsDirty:true,logistics:{efficiency:1,capacity:20,demand:0,connectedRoads:0,seasonal:1},accumulator:0', 'runtime logistics state')
          replace_once('Crown.Runtime.roadConnected=connected;Crown.Runtime.roadDirty=false;Crown.Runtime.uiDirty=true;}', 'Crown.Runtime.roadConnected=connected;Crown.Runtime.roadDirty=false;Crown.Runtime.cartsDirty=true;Crown.Runtime.uiDirty=true;}', 'network cart invalidation')

          logistics_function = """    function logisticsStats(season=Crown.Util.seasonForMonth(Crown.State.time.month)){const connectedRoads=Crown.Runtime.roadConnected.reduce((sum,v)=>sum+(v?1:0),0),weights={3:8,4:10,6:12,7:14,8:12,9:16};let demand=0;for(const {i,def} of buildingEntries()){const rt=Crown.Runtime.buildingRuntime.get(i);if(rt?.connected&&weights[def.id])demand+=weights[def.id]*Math.max(.25,rt.efficiency||0);}const capacity=20+connectedRoads*.32+countOperating('stockpile')*18+countOperating('market')*12+countOperating('cartshed')*38,seasonal=season==='spring'?.78:season==='winter'?.68:season==='autumn'?.95:1,efficiency=demand<=0?1:Crown.Util.clamp(capacity*seasonal/demand,.25,1),stats={efficiency,capacity,demand,connectedRoads,seasonal};Crown.Runtime.logistics=stats;return stats;}\n"""
          replace_once('    function dailyProductionPreview(', logistics_function + '    function dailyProductionPreview(', 'logistics calculation')

          def patch_preview(line):
              line = line.replace("const c=Crown.State.cities[0],flow={food:0,fuel:0,wood:0,stone:0,gold:0,grain:0,flour:0};for", "const c=Crown.State.cities[0],flow={food:0,fuel:0,wood:0,stone:0,gold:0,grain:0,flour:0},logistics=logisticsStats(season),productionIds=new Set([3,4,6,9]);for")
              line = line.replace("const rt=Crown.Runtime.buildingRuntime.get(i),e=rt?.efficiency||0;if(!e)continue;", "const rt=Crown.Runtime.buildingRuntime.get(i),base=rt?.efficiency||0;if(!base)continue;const e=base*(productionIds.has(def.id)?logistics.efficiency:1);")
              return line
          replace_line('    function dailyProductionPreview(', patch_preview, 'production logistics scaling')

          def patch_daily(line):
              line = line.replace('calculateWorkforce();const flow=', 'calculateWorkforce();const logistics=logisticsStats(season),transport=Math.max(.35,logistics.efficiency);const flow=')
              line = line.replace("let mill=countOperating('mill'),bakery=countOperating('bakery');", "let mill=countOperating('mill')*transport,bakery=countOperating('bakery')*transport;")
              line = line.replace("growHousing();applyStorage();", "if(logistics.efficiency<.55&&Crown.Util.nextRandom(Crown.State)<.035)Crown.Log.add(`物流混雑により生産効率が${Math.round(logistics.efficiency*100)}%まで低下しています。`,'warn');growHousing();applyStorage();")
              return line
          replace_line('    function updateDaily(', patch_daily, 'daily logistics')

          replace_line('    return Object.freeze({calculateWorkforce,housingCapacity,hasWater,happiness,storageCapacity,dailyProductionPreview,updateDaily,updateMonthly,countOperating});', lambda line: line.replace('storageCapacity,dailyProductionPreview', 'storageCapacity,logisticsStats,dailyProductionPreview'), 'city exports')

          carts_module = """
  Crown.Systems.Carts=(()=>{
    function roadTiles(){const c=Crown.State.cities[0],out=[];for(let i=0;i<c.roads.length;i++)if(c.roads[i]&&Crown.Runtime.roadConnected[i])out.push(i);return out;}
    function nextRoad(index,previous){const w=Crown.State.world.width,x=index%w,y=Math.floor(index/w),choices=Crown.Util.neighbors4(x,y).filter(([nx,ny])=>Crown.Util.inBounds(nx,ny)).map(([nx,ny])=>Crown.Util.index(nx,ny)).filter(i=>Crown.State.cities[0].roads[i]&&Crown.Runtime.roadConnected[i]&&i!==previous);return choices.length?choices[Math.floor(Crown.Util.nextRandom(Crown.State)*choices.length)]:previous>=0?previous:index;}
    function rebuild(){const roads=roadTiles(),capacity=Crown.Runtime.logistics?.capacity||20,desired=roads.length?Math.min(28,Math.max(1,Math.floor(capacity/18))):0;Crown.Runtime.carts=Array.from({length:desired},(_,n)=>{const index=roads[(n*17)%roads.length],next=nextRoad(index,-1);return{index,next,previous:-1,t:(n%7)/7};});Crown.Runtime.cartsDirty=false;}
    function update(dt){if(Crown.Runtime.cartsDirty)rebuild();const speed=.45+(Crown.Runtime.logistics?.efficiency||1)*.75;for(const cart of Crown.Runtime.carts){cart.t+=dt*speed;while(cart.t>=1){cart.t-=1;cart.previous=cart.index;cart.index=cart.next;cart.next=nextRoad(cart.index,cart.previous);}}}
    return Object.freeze({rebuild,update});
  })();
"""
          agents_line_prefix = '  Crown.Systems.Agents=(()=>'
          replace_line(agents_line_prefix, lambda line: line + carts_module.rstrip('\n'), 'cart system')

          draw_cart = """    function drawCarts(ctx,tile){if(Crown.Runtime.camera.zoom<1.35)return;ctx.save();ctx.fillStyle='#d89b52';ctx.strokeStyle='#382719';ctx.lineWidth=1;for(const cart of Crown.Runtime.carts){const w=Crown.State.world.width,ax=cart.index%w+.5,ay=Math.floor(cart.index/w)+.5,bx=cart.next%w+.5,by=Math.floor(cart.next/w)+.5,x=Crown.Runtime.camera.x+(ax+(bx-ax)*cart.t)*tile,y=Crown.Runtime.camera.y+(ay+(by-ay)*cart.t)*tile;if(x<-8||y<-8||x>Crown.Runtime.viewport.width+8||y>Crown.Runtime.viewport.height+8)continue;const s=Math.max(3,Math.min(7,tile*.28));ctx.fillRect(Math.round(x-s/2),Math.round(y-s/2),s,s*.7);ctx.strokeRect(Math.round(x-s/2),Math.round(y-s/2),s,s*.7);}ctx.restore();}\n"""
          replace_once('    function drawHover(ctx,tile){', draw_cart + '    function drawHover(ctx,tile){', 'cart rendering function')
          replace_line('    function draw(){', lambda line: line.replace('drawAgents(ctx,Crown.Config.BASE_TILE*z);drawHover', 'drawAgents(ctx,Crown.Config.BASE_TILE*z);drawCarts(ctx,Crown.Config.BASE_TILE*z);drawHover'), 'cart rendering call')

          def patch_ui(line):
              marker = "$('city-years').textContent=`${s.time.year-1}年`;const f=forecast()"
              replacement = "$('city-years').textContent=`${s.time.year-1}年`;const logistics=Crown.Systems.City.logisticsStats(seasonKey);$('logistics-efficiency').textContent=`${Math.round(logistics.efficiency*100)}%`;$('logistics-capacity').textContent=logistics.capacity.toFixed(1);$('logistics-demand').textContent=logistics.demand.toFixed(1);$('logistics-roads').textContent=Crown.Util.format(logistics.connectedRoads);const f=forecast()"
              if marker not in line:
                  raise SystemExit('UI logistics marker missing')
              return line.replace(marker, replacement)
          replace_line('    function update(){if(!Crown.Runtime.uiDirty)return;', patch_ui, 'logistics UI update')

          replace_all('Crown.Systems.Agents.rebuild();Crown.Render.centerCamera();', 'Crown.Systems.Agents.rebuild();Crown.Systems.Carts.rebuild();Crown.Render.centerCamera();', 'cart rebuild lifecycle')
          replace_line('    function frame(ts){', lambda line: line.replace('Crown.Systems.Agents.update(Crown.Config.FIXED_STEP_MS/1000);', 'Crown.Systems.Agents.update(Crown.Config.FIXED_STEP_MS/1000);Crown.Systems.Carts.update(Crown.Config.FIXED_STEP_MS/1000);'), 'cart frame update')

          def patch_init(line):
              line = line.replace("window.addEventListener('resize',Crown.Render.resize);", "window.addEventListener('resize',Crown.Render.resize);window.visualViewport?.addEventListener('resize',Crown.Render.resize);")
              return line
          replace_line('    function init(){', patch_init, 'visual viewport resize')

          replace_line('    function bind(){const c=Crown.Runtime.canvas;', lambda line: line.replace("window.addEventListener('keyup',onKeyUp);", "window.addEventListener('keyup',onKeyUp);document.getElementById('canvas-wrap').addEventListener('pointerdown',()=>Crown.UI.closeDrawers());"), 'drawer backdrop behavior')

          Path('index.html').write_text(html, encoding='utf-8', newline='')
          print(f'Rebuilt index.html: {len(html)} characters')
          PY

          rm -rf .crown-phase2 .crown-packed .phase2-diagnostic.txt .github/workflows/assemble-phase2-logistics.yml

      - name: Validate rebuilt game
        shell: bash
        run: |
          set -euo pipefail
          grep -q "Phase 2 Logistics 0.4.0" index.html
          grep -q "function logisticsStats" index.html
          grep -q "cartshed:Object.freeze" index.html
          grep -q "function drawCarts" index.html
          grep -q "visualViewport" index.html
          sed -n '/<script>/,/<\/script>/p' index.html | sed '1d;$d' > /tmp/crown-latest.js
          node --check /tmp/crown-latest.js
          python3 - <<'PY'
          from pathlib import Path
          text=Path('index.html').read_text(encoding='utf-8')
          assert text.lstrip().lower().startswith('<!doctype html')
          assert text.rstrip().lower().endswith('</html>')
          assert '.crown-packed/' not in text
          assert 'DecompressionStream' not in text
          print('Single-file HTML validation passed')
          PY

      - name: Commit rebuilt latest game
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "rebuild playable phase 2 latest version"
          git push origin HEAD:agent/phase2-logistics
