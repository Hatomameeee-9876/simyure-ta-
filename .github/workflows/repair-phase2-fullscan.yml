name: Recover Phase 2 full payload

on:
  pull_request:
    branches:
      - main
    types: [opened, reopened, ready_for_review]

permissions:
  contents: write

jobs:
  scan:
    if: github.head_ref == 'agent/phase2-logistics' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        segment: [0, 1, 2]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase2-logistics

      - name: Scan payload segment
        shell: bash
        env:
          SEGMENT: ${{ matrix.segment }}
        run: |
          set -euo pipefail
          mkdir -p recovery-result
          python3 - <<'PY'
          from pathlib import Path
          import base64
          import gzip
          import os
          import string

          segment = int(os.environ['SEGMENT'])
          files = sorted(Path('.crown-phase2').glob('part-*.b64'))
          parts = [''.join(p.read_text(encoding='utf-8').split()) for p in files]
          damaged = ''.join(parts[:3])
          tail_bytes = base64.b64decode(parts[3], validate=True)
          alphabet = string.ascii_uppercase + string.ascii_lowercase + string.digits + '+/'

          total_positions = len(damaged) + 1
          start = total_positions * segment // 3
          end = total_positions * (segment + 1) // 3
          tested = 0
          result = None

          for position in range(start, end):
              for char in alphabet:
                  tested += 1
                  repaired = damaged[:position] + char + damaged[position:]
                  try:
                      compressed = base64.b64decode(repaired, validate=True) + tail_bytes
                      html = gzip.decompress(compressed)
                      text = html.decode('utf-8')
                  except Exception:
                      continue

                  if (text.lstrip().lower().startswith('<!doctype html')
                          and 'function logisticsStats' in text
                          and 'cartshed:Object.freeze' in text
                          and text.rstrip().lower().endswith('</html>')):
                      result = (position, char)
                      break
              if result:
                  break
              if (position - start) % 1000 == 0:
                  print(f'segment {segment}: checked {position - start}/{end - start}')

          lines = [
              f'segment={segment}',
              f'start={start}',
              f'end={end}',
              f'tested_candidates={tested}',
          ]
          if result:
              lines.extend([
                  'recovered=true',
                  f'missing_position={result[0]}',
                  f'missing_character={result[1]}',
              ])
          else:
              lines.append('recovered=false')

          output = Path('recovery-result') / f'result-{segment}.txt'
          output.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          print('\n'.join(lines))
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: recovery-segment-${{ matrix.segment }}
          path: recovery-result/result-${{ matrix.segment }}.txt

  assemble:
    needs: scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase2-logistics
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: recovery-segment-*
          path: recovery-results
          merge-multiple: true

      - name: Assemble exact result
        shell: bash
        run: |
          set -euo pipefail
          cat recovery-results/result-*.txt | tee .phase2-diagnostic.txt
          python3 - <<'PY'
          from pathlib import Path
          import base64
          import gzip
          import re
          import subprocess
          import tempfile

          result_files = sorted(Path('recovery-results').glob('result-*.txt'))
          selected = None
          for result_file in result_files:
              values = {}
              for line in result_file.read_text(encoding='utf-8').splitlines():
                  if '=' in line:
                      key, value = line.split('=', 1)
                      values[key] = value
              if values.get('recovered') == 'true':
                  selected = (int(values['missing_position']), values['missing_character'])
                  break

          if selected is None:
              raise SystemExit('No exact single-character recovery found in the full payload')

          files = sorted(Path('.crown-phase2').glob('part-*.b64'))
          parts = [''.join(p.read_text(encoding='utf-8').split()) for p in files]
          damaged = ''.join(parts[:3])
          position, char = selected
          repaired = damaged[:position] + char + damaged[position:]
          compressed = base64.b64decode(repaired, validate=True) + base64.b64decode(parts[3], validate=True)
          text = gzip.decompress(compressed).decode('utf-8')
          Path('index.html').write_text(text, encoding='utf-8', newline='')

          scripts = re.findall(r'<script(?:\s[^>]*)?>(.*?)</script>', text, flags=re.S | re.I)
          if not scripts:
              raise SystemExit('No script block found in recovered HTML')
          with tempfile.NamedTemporaryFile('w', suffix='.js', encoding='utf-8', delete=False) as tmp:
              tmp.write('\n'.join(scripts))
              tmp_path = tmp.name
          check = subprocess.run(['node', '--check', tmp_path], capture_output=True, text=True)
          Path(tmp_path).unlink(missing_ok=True)
          if check.returncode != 0:
              raise SystemExit(check.stderr or check.stdout)
          PY

      - name: Commit recovered Phase 2
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .crown-phase2 .github/workflows/assemble-phase2-logistics.yml recovery-results .phase2-diagnostic.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "recover complete phase 2 game"
          git push origin HEAD:agent/phase2-logistics
