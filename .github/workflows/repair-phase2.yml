name: Repair Phase 2 assembly

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'agent/phase2-logistics' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase2-logistics
          fetch-depth: 0

      - name: Recover final Base64 grouping
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import base64
          import gzip
          import string
          import zlib

          files = sorted(Path('.crown-phase2').glob('part-*.b64'))
          parts = [''.join(p.read_text(encoding='utf-8').split()) for p in files]
          damaged_group = parts[0]
          suffix_groups = [parts[1] + parts[2], parts[3]]
          suffix_bytes = b''.join(base64.b64decode(group, validate=True) for group in suffix_groups)
          report = [
              'grouping=part00 / part01+part02 / part03',
              f'damaged_group_chars={len(damaged_group)}',
          ]

          probe_text = damaged_group + 'A'
          probe_head = base64.b64decode(probe_text, validate=True)
          probe_blob = probe_head + suffix_bytes
          inflater = zlib.decompressobj(16 + zlib.MAX_WBITS)
          fail_offset = None
          produced = 0
          for index, byte in enumerate(probe_blob):
              try:
                  produced += len(inflater.decompress(bytes([byte])))
              except zlib.error as exc:
                  fail_offset = index
                  report.append(f'probe_error={exc}')
                  break
          report.append(f'fail_offset={fail_offset}')
          report.append(f'produced_before_error={produced}')
          approx = len(damaged_group) if fail_offset is None else min(len(damaged_group), max(0, (fail_offset * 4) // 3))
          report.append(f'approx_base64_position={approx}')

          alphabet = string.ascii_uppercase + string.ascii_lowercase + string.digits + '+/'
          candidate_positions = []
          for pos in [len(damaged_group)]:
              if pos not in candidate_positions:
                  candidate_positions.append(pos)
          for radius in (128, 512, 2048, 8192):
              lo = max(0, approx - radius)
              hi = min(len(damaged_group), approx + radius)
              for pos in range(lo, hi + 1):
                  if pos not in candidate_positions:
                      candidate_positions.append(pos)

          tested = 0
          result = None
          for pos in candidate_positions:
              for char in alphabet:
                  tested += 1
                  candidate_text = damaged_group[:pos] + char + damaged_group[pos:]
                  try:
                      head_bytes = base64.b64decode(candidate_text, validate=True)
                      html = gzip.decompress(head_bytes + suffix_bytes)
                  except Exception:
                      continue
                  if b'<html' in html.lower() and b'logisticsStats' in html and b'cartshed' in html:
                      result = (pos, char, html)
                      break
              if result:
                  break

          report.append(f'tested_candidates={tested}')
          if result:
              pos, char, html = result
              Path('index.html').write_bytes(html)
              report.extend(['recovered=true', f'missing_position={pos}', f'missing_character={char}', f'html_bytes={len(html)}'])
          else:
              report.append('recovered=false')

          Path('.phase2-diagnostic.txt').write_text('\n'.join(report) + '\n', encoding='utf-8')
          print('\n'.join(report))
          PY

          if grep -q '^recovered=true$' .phase2-diagnostic.txt; then
            sed -n '/<script>/,/<\/script>/p' index.html | sed '1d;$d' > /tmp/crown-phase2.js
            node --check /tmp/crown-phase2.js
          fi

      - name: Commit recovery result
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .phase2-diagnostic.txt
          git commit -m "test final phase 2 payload grouping"
          git push origin HEAD:agent/phase2-logistics
