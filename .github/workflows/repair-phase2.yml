name: Repair Phase 2 assembly

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'agent/phase2-logistics' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase2-logistics
          fetch-depth: 0

      - name: Locate third corruption
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import base64
          import codecs
          import zlib

          files = sorted(Path('.crown-phase2').glob('part-*.b64'))
          parts = [''.join(p.read_text(encoding='utf-8').split()) for p in files]
          damaged = ''.join(parts[:3])
          tail = base64.b64decode(parts[3], validate=True)

          def locate(first_char, second_char):
              text = damaged[:1334] + first_char + damaged[1334:]
              text = text[:12695] + second_char + text[12696:]
              blob = base64.b64decode(text, validate=True) + tail
              inflater = zlib.decompressobj(16 + zlib.MAX_WBITS)
              decoder = codecs.getincrementaldecoder('utf-8')('strict')
              valid = 0
              for index, byte in enumerate(blob):
                  try:
                      out = inflater.decompress(bytes([byte]))
                  except zlib.error as exc:
                      return valid, index, f'zlib:{exc}'
                  if not out:
                      continue
                  try:
                      decoder.decode(out, final=False)
                      valid += len(out)
                  except UnicodeDecodeError as exc:
                      valid += exc.start
                      return valid, index, f'utf8:{exc}'
              return valid, len(blob), 'end'

          lines = ['mode=locate-third-corruption']
          for first_char in 'ABCD':
              for second_char in 'ABCDEFGHIJKLMNOP':
                  valid, compressed_break, reason = locate(first_char, second_char)
                  approx = (compressed_break * 4) // 3
                  lines.append(
                      f'first_char={first_char} second_char={second_char} valid_prefix={valid} '
                      f'compressed_break={compressed_break} approx_base64_position={approx} reason={reason}'
                  )

          Path('.phase2-diagnostic.txt').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          print('\n'.join(lines[:20]))
          PY

      - name: Commit third-corruption location
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .phase2-diagnostic.txt
          git commit -m "locate third phase 2 corruption"
          git push origin HEAD:agent/phase2-logistics
