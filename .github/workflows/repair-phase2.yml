name: Repair Phase 2 assembly

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'agent/phase2-logistics' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase2-logistics
          fetch-depth: 0

      - name: Search third corruption
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import base64
          import heapq
          import string
          import zlib

          files = sorted(Path('.crown-phase2').glob('part-*.b64'))
          parts = [''.join(p.read_text(encoding='utf-8').split()) for p in files]
          damaged = ''.join(parts[:3])
          tail = base64.b64decode(parts[3], validate=True)
          alphabet = string.ascii_uppercase + string.ascii_lowercase + string.digits + '+/'

          # Best-equivalent repairs found for the first two damaged regions.
          repaired = damaged[:1334] + 'D' + damaged[1334:]
          repaired = repaired[:12695] + 'A' + repaired[12696:]

          def score(text):
              try:
                  blob = base64.b64decode(text, validate=True) + tail
              except Exception:
                  return 0, 0, False
              inflater = zlib.decompressobj(16 + zlib.MAX_WBITS)
              output = bytearray()
              for off in range(0, len(blob), 128):
                  try:
                      output.extend(inflater.decompress(blob[off:off + 128]))
                  except zlib.error:
                      break
              try:
                  output.decode('utf-8')
                  return len(output), len(output), True
              except UnicodeDecodeError as exc:
                  return exc.start, len(output), False

          top = []
          tested = 0
          for third_pos in range(21400, 22101):
              original = repaired[third_pos]
              if original == '=':
                  continue
              for third_char in alphabet:
                  if third_char == original:
                      continue
                  tested += 1
                  candidate = repaired[:third_pos] + third_char + repaired[third_pos + 1:]
                  valid_prefix, output_len, utf8_complete = score(candidate)
                  item = ((valid_prefix, output_len, utf8_complete), third_pos, original, third_char)
                  if len(top) < 80:
                      heapq.heappush(top, item)
                  elif item > top[0]:
                      heapq.heapreplace(top, item)

          ranked = sorted(top, reverse=True)
          lines = [
              'mode=search-third-corruption',
              'first_repair=insert D at 1334',
              'second_repair=replace position 12695 with A',
              'searched_positions=21400-22100',
              f'tested_candidates={tested}',
          ]
          for rank, (candidate_score, pos, original, char) in enumerate(ranked, 1):
              lines.append(
                  f'rank{rank}: valid_utf8_prefix={candidate_score[0]} output_bytes={candidate_score[1]} '
                  f'utf8_complete={candidate_score[2]} third_position={pos} original={original} third_char={char}'
              )

          Path('.phase2-diagnostic.txt').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          print('\n'.join(lines[:25]))
          PY

      - name: Commit third-corruption search
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .phase2-diagnostic.txt
          git commit -m "search third phase 2 corruption"
          git push origin HEAD:agent/phase2-logistics
