name: Repair Phase 2 assembly

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'agent/phase2-logistics' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase2-logistics
          fetch-depth: 0

      - name: Recover missing Base64 character
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import base64
          import gzip
          import string

          files = sorted(Path('.crown-phase2').glob('part-*.b64'))
          if len(files) != 4:
              raise SystemExit(f'Expected 4 payload parts, found {len(files)}')

          parts = [''.join(p.read_text(encoding='utf-8').split()) for p in files]
          first = parts[0]
          if len(first) % 4 != 3:
              raise SystemExit(f'Unexpected first-part length: {len(first)}')

          try:
              suffix = b''.join(base64.b64decode(part, validate=True) for part in parts[1:])
          except Exception as exc:
              raise SystemExit(f'Unable to decode intact payload parts: {exc}')

          alphabet = string.ascii_uppercase + string.ascii_lowercase + string.digits + '+/'
          # A staging boundary is the most likely loss point, so test the end first.
          positions = [len(first)] + list(range(len(first)))
          tested = 0
          result = None

          for pos in positions:
              for char in alphabet:
                  tested += 1
                  candidate_text = first[:pos] + char + first[pos:]
                  try:
                      first_bytes = base64.b64decode(candidate_text, validate=True)
                      html = gzip.decompress(first_bytes + suffix)
                  except Exception:
                      continue

                  if (b'<html' in html.lower()
                          and b'function logisticsStats' in html
                          and b'cartshed:Object.freeze' in html):
                      result = (pos, char, html)
                      break
              if result:
                  break

          if not result:
              raise SystemExit(f'No valid repair found after {tested} candidates')

          pos, char, html = result
          Path('index.html').write_bytes(html)
          Path('.phase2-diagnostic.txt').write_text(
              f'recovered=true\nmissing_position={pos}\nmissing_character={char}\n'
              f'tested_candidates={tested}\nhtml_bytes={len(html)}\n',
              encoding='utf-8'
          )
          print(f'Recovered Phase 2 HTML: position={pos}, char={char}, bytes={len(html)}')
          PY

          sed -n '/<script>/,/<\/script>/p' index.html | sed '1d;$d' > /tmp/crown-phase2.js
          node --check /tmp/crown-phase2.js

      - name: Commit recovered Phase 2
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .phase2-diagnostic.txt
          git commit -m "recover complete phase 2 game"
          git push origin HEAD:agent/phase2-logistics
