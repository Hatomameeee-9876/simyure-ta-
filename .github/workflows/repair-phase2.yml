name: Repair Phase 2 assembly

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'agent/phase2-logistics' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase2-logistics
          fetch-depth: 0

      - name: Diagnose recovered HTML candidates
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import base64
          import heapq
          import re
          import string
          import subprocess
          import tempfile
          import zlib

          files = sorted(Path('.crown-phase2').glob('part-*.b64'))
          parts = [''.join(p.read_text(encoding='utf-8').split()) for p in files]
          damaged = ''.join(parts[:3])
          tail = base64.b64decode(parts[3], validate=True)
          alphabet = string.ascii_uppercase + string.ascii_lowercase + string.digits + '+/'
          top = []
          tested = 0

          for pos in range(1290, 1361):
              for char in alphabet:
                  tested += 1
                  candidate = damaged[:pos] + char + damaged[pos:]
                  try:
                      blob = base64.b64decode(candidate, validate=True) + tail
                  except Exception:
                      continue
                  inflater = zlib.decompressobj(16 + zlib.MAX_WBITS)
                  output = bytearray()
                  error = None
                  for off in range(0, len(blob), 64):
                      try:
                          output.extend(inflater.decompress(blob[off:off + 64]))
                      except zlib.error as exc:
                          error = str(exc)
                          break
                  item = (len(output), pos, char, bytes(output), error, inflater.eof)
                  if len(top) < 40:
                      heapq.heappush(top, item)
                  elif item[:3] > top[0][:3]:
                      heapq.heapreplace(top, item)

          ranked = sorted(top, key=lambda item: item[0], reverse=True)
          lines = [f'tested_candidates={tested}']
          for rank, (size, pos, char, output, error, eof) in enumerate(ranked, 1):
              utf8 = True
              try:
                  text = output.decode('utf-8')
              except UnicodeDecodeError as exc:
                  utf8 = False
                  text = output.decode('utf-8', errors='replace')
                  decode_error = str(exc)
              else:
                  decode_error = ''

              flags = {
                  'doctype': text.lstrip().lower().startswith('<!doctype html'),
                  'logistics': 'function logisticsStats' in text,
                  'cartshed': 'cartshed:Object.freeze' in text,
                  'phase2': 'Phase 2' in text,
                  'close_script': '</script>' in text,
                  'close_html': '</html>' in text,
                  'ends_html': text.rstrip().lower().endswith('</html>'),
              }
              node_ok = False
              node_msg = ''
              scripts = re.findall(r'<script(?:\s[^>]*)?>(.*?)</script>', text, flags=re.S | re.I)
              if scripts:
                  with tempfile.NamedTemporaryFile('w', suffix='.js', encoding='utf-8', delete=False) as tmp:
                      tmp.write('\n'.join(scripts))
                      tmp_path = tmp.name
                  check = subprocess.run(['node', '--check', tmp_path], capture_output=True, text=True)
                  Path(tmp_path).unlink(missing_ok=True)
                  node_ok = check.returncode == 0
                  node_msg = (check.stderr or check.stdout).splitlines()[-1:] or ['']
                  node_msg = node_msg[0]

              suffix = text[-240:].replace('\\', '\\\\').replace('\n', '\\n').replace('\r', '\\r')
              lines.append(
                  f'rank{rank}: bytes={size} position={pos} char={char} eof={eof} utf8={utf8} '
                  + ' '.join(f'{key}={value}' for key, value in flags.items())
                  + f' node_ok={node_ok} error={error!r} decode_error={decode_error!r}'
              )
              lines.append(f'rank{rank}_suffix={suffix}')

          Path('.phase2-diagnostic.txt').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          print('\n'.join(lines[:8]))
          PY

      - name: Commit diagnostic
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .phase2-diagnostic.txt
          git commit -m "diagnose recovered phase 2 HTML"
          git push origin HEAD:agent/phase2-logistics
