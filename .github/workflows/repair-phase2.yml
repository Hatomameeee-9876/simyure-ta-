name: Repair Phase 2 assembly

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'agent/phase2-logistics' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase2-logistics
          fetch-depth: 0

      - name: Locate second corruption precisely
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import base64
          import codecs
          import zlib

          files = sorted(Path('.crown-phase2').glob('part-*.b64'))
          parts = [''.join(p.read_text(encoding='utf-8').split()) for p in files]
          damaged = ''.join(parts[:3])
          tail = base64.b64decode(parts[3], validate=True)
          first_candidates = [
              (1334, 'A'), (1334, 'B'), (1334, 'C'), (1334, 'D'),
              (1332, 'x'), (1332, 't'), (1332, 'p'), (1332, 'l'),
              (1332, 'd'), (1332, 'Z'), (1332, 'V'), (1332, 'N'),
              (1332, 'J'), (1332, 'F'), (1332, '9'), (1332, '5'),
          ]

          lines = ['mode=locate-second-corruption']
          for first_pos, first_char in first_candidates:
              text = damaged[:first_pos] + first_char + damaged[first_pos:]
              blob = base64.b64decode(text, validate=True) + tail
              inflater = zlib.decompressobj(16 + zlib.MAX_WBITS)
              decoder = codecs.getincrementaldecoder('utf-8')('strict')
              valid = 0
              break_input = None
              break_reason = None
              for index, byte in enumerate(blob):
                  try:
                      out = inflater.decompress(bytes([byte]))
                  except zlib.error as exc:
                      break_input = index
                      break_reason = f'zlib:{exc}'
                      break
                  if not out:
                      continue
                  try:
                      decoder.decode(out, final=False)
                      valid += len(out)
                  except UnicodeDecodeError as exc:
                      valid += exc.start
                      break_input = index
                      break_reason = f'utf8:{exc}'
                      break
              approx = None if break_input is None else (break_input * 4) // 3
              lines.append(
                  f'first_position={first_pos} first_char={first_char} valid_prefix={valid} '
                  f'compressed_break={break_input} approx_base64_position={approx} reason={break_reason}'
              )

          Path('.phase2-diagnostic.txt').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          print('\n'.join(lines))
          PY

      - name: Commit location diagnostic
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .phase2-diagnostic.txt
          git commit -m "locate second phase 2 corruption"
          git push origin HEAD:agent/phase2-logistics
