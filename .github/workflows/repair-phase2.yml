name: Repair Phase 2 assembly

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'agent/phase2-logistics' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase2-logistics
          fetch-depth: 0

      - name: Rank missing-character candidates
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import base64
          import heapq
          import string
          import zlib

          files = sorted(Path('.crown-phase2').glob('part-*.b64'))
          parts = [''.join(p.read_text(encoding='utf-8').split()) for p in files]
          damaged = ''.join(parts[:3])
          tail = base64.b64decode(parts[3], validate=True)
          alphabet = string.ascii_uppercase + string.ascii_lowercase + string.digits + '+/'
          max_position = min(2400, len(damaged))
          top = []
          tested = 0

          for pos in range(max_position + 1):
              for char in alphabet:
                  tested += 1
                  text = damaged[:pos] + char + damaged[pos:]
                  try:
                      blob = base64.b64decode(text, validate=True) + tail
                  except Exception:
                      continue

                  inflater = zlib.decompressobj(16 + zlib.MAX_WBITS)
                  fail_at = len(blob)
                  produced = 0
                  for off in range(0, len(blob), 64):
                      try:
                          produced += len(inflater.decompress(blob[off:off + 64]))
                      except zlib.error:
                          fail_at = off
                          break

                  score = (fail_at, produced)
                  item = (score, pos, char)
                  if len(top) < 30:
                      heapq.heappush(top, item)
                  elif item > top[0]:
                      heapq.heapreplace(top, item)

          ranked = sorted(top, reverse=True)
          lines = [
              'mode=rank-insertion-candidates',
              'grouping=part00+part01+part02 / part03',
              f'searched_positions=0-{max_position}',
              f'tested_candidates={tested}',
          ]
          for rank, (score, pos, char) in enumerate(ranked, 1):
              lines.append(f'rank{rank}: fail_offset={score[0]} produced={score[1]} position={pos} char={char}')

          Path('.phase2-diagnostic.txt').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          print('\n'.join(lines))
          PY

      - name: Commit ranking result
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .phase2-diagnostic.txt
          git commit -m "rank phase 2 corruption candidates"
          git push origin HEAD:agent/phase2-logistics
