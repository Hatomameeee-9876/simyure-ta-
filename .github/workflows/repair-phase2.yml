name: Repair Phase 2 assembly

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'agent/phase2-logistics' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase2-logistics
          fetch-depth: 0

      - name: Rank candidates by valid UTF-8 prefix
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import base64
          import heapq
          import string
          import zlib

          files = sorted(Path('.crown-phase2').glob('part-*.b64'))
          parts = [''.join(p.read_text(encoding='utf-8').split()) for p in files]
          damaged = ''.join(parts[:3])
          tail = base64.b64decode(parts[3], validate=True)
          alphabet = string.ascii_uppercase + string.ascii_lowercase + string.digits + '+/'
          top = []
          tested = 0

          for pos in range(0, 2601):
              for char in alphabet:
                  tested += 1
                  candidate = damaged[:pos] + char + damaged[pos:]
                  try:
                      blob = base64.b64decode(candidate, validate=True) + tail
                  except Exception:
                      continue

                  inflater = zlib.decompressobj(16 + zlib.MAX_WBITS)
                  output = bytearray()
                  for off in range(0, len(blob), 128):
                      try:
                          output.extend(inflater.decompress(blob[off:off + 128]))
                      except zlib.error:
                          break

                  try:
                      output.decode('utf-8')
                      valid_prefix = len(output)
                      utf8_complete = True
                  except UnicodeDecodeError as exc:
                      valid_prefix = exc.start
                      utf8_complete = False

                  source_prefix = 0
                  text_prefix = output[:valid_prefix].decode('utf-8', errors='ignore')
                  if text_prefix.lstrip().lower().startswith('<!doctype html'):
                      source_prefix += 1000000
                  if '<style>' in text_prefix:
                      source_prefix += 100000
                  score = (source_prefix + valid_prefix, valid_prefix, len(output))
                  item = (score, pos, char, utf8_complete, len(output))
                  if len(top) < 50:
                      heapq.heappush(top, item)
                  elif item > top[0]:
                      heapq.heapreplace(top, item)

          ranked = sorted(top, reverse=True)
          lines = [
              'mode=rank-by-utf8-prefix',
              'grouping=part00+part01+part02 / part03',
              'searched_positions=0-2600',
              f'tested_candidates={tested}',
          ]
          for rank, (score, pos, char, complete, output_len) in enumerate(ranked, 1):
              lines.append(
                  f'rank{rank}: valid_utf8_prefix={score[1]} output_bytes={output_len} '
                  f'position={pos} char={char} utf8_complete={complete}'
              )

          Path('.phase2-diagnostic.txt').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          print('\n'.join(lines[:15]))
          PY

      - name: Commit UTF-8 ranking
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .phase2-diagnostic.txt
          git commit -m "rank phase 2 candidates by UTF-8 validity"
          git push origin HEAD:agent/phase2-logistics
