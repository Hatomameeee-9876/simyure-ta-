name: Repair Phase 2 assembly

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'agent/phase2-logistics' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase2-logistics
          fetch-depth: 0

      - name: Diagnose and decode Phase 2 payload
        shell: bash
        run: |
          set -u
          python3 - <<'PY'
          from pathlib import Path
          import base64
          import gzip
          import traceback

          report = []
          files = sorted(Path('.crown-phase2').glob('part-*.b64'))
          report.append(f'files={len(files)}')
          parts = []
          for p in files:
              text = ''.join(p.read_text(encoding='utf-8').split())
              parts.append(text)
              report.append(f'{p.name}: chars={len(text)} padding={text.count("=")} start={text[:16]} end={text[-16:]}')

          candidates = []
          try:
              decoded = base64.b64decode(''.join(parts))
              candidates.append(('joined-base64', decoded))
              report.append(f'joined-base64 decoded={len(decoded)} bytes')
          except Exception as e:
              report.append(f'joined-base64 ERROR: {type(e).__name__}: {e}')

          try:
              chunks = []
              for i, part in enumerate(parts):
                  chunk = base64.b64decode(part)
                  chunks.append(chunk)
                  report.append(f'part-{i:02d} decoded={len(chunk)} bytes')
              decoded = b''.join(chunks)
              candidates.append(('per-part-base64', decoded))
              report.append(f'per-part-base64 decoded={len(decoded)} bytes')
          except Exception as e:
              report.append(f'per-part-base64 ERROR: {type(e).__name__}: {e}')

          assembled = False
          for name, candidate in candidates:
              report.append(f'{name} magic={candidate[:16].hex()}')
              try:
                  html = gzip.decompress(candidate)
                  report.append(f'{name} gzip={len(html)} bytes html={b"<html" in html.lower()} logisticsStats={b"logisticsStats" in html} cartshed={b"cartshed" in html}')
                  if b'<html' in html.lower() and not assembled:
                      Path('index.html').write_bytes(html)
                      report.append(f'WROTE index.html from {name}')
                      assembled = True
              except Exception as e:
                  report.append(f'{name} GZIP ERROR: {type(e).__name__}: {e}')

          Path('.phase2-diagnostic.txt').write_text('\n'.join(report) + '\n', encoding='utf-8')
          print('\n'.join(report))
          PY

          if [ -f index.html ]; then
            grep -q "function logisticsStats" index.html || echo "grep logisticsStats failed" >> .phase2-diagnostic.txt
            grep -q "cartshed:Object.freeze" index.html || echo "grep cartshed failed" >> .phase2-diagnostic.txt
            sed -n '/<script>/,/<\/script>/p' index.html | sed '1d;$d' > /tmp/crown-phase2.js
            node --check /tmp/crown-phase2.js >> .phase2-diagnostic.txt 2>&1 || true
          fi

      - name: Commit diagnostic result
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .phase2-diagnostic.txt
          git commit -m "diagnose phase 2 payload assembly"
          git push origin HEAD:agent/phase2-logistics
