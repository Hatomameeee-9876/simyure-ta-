name: Repair Phase 2 assembly

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'agent/phase2-logistics' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase2-logistics
          fetch-depth: 0

      - name: Recover HTML from near-complete DEFLATE stream
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import base64
          import re
          import string
          import subprocess
          import tempfile
          import zlib

          files = sorted(Path('.crown-phase2').glob('part-*.b64'))
          parts = [''.join(p.read_text(encoding='utf-8').split()) for p in files]
          damaged = ''.join(parts[:3])
          tail = base64.b64decode(parts[3], validate=True)
          alphabet = string.ascii_uppercase + string.ascii_lowercase + string.digits + '+/'

          valid = []
          tested = 0
          for pos in range(1260, 1401):
              for char in alphabet:
                  tested += 1
                  candidate = damaged[:pos] + char + damaged[pos:]
                  try:
                      blob = base64.b64decode(candidate, validate=True) + tail
                  except Exception:
                      continue

                  inflater = zlib.decompressobj(16 + zlib.MAX_WBITS)
                  output = bytearray()
                  error = None
                  for off in range(0, len(blob), 128):
                      try:
                          output.extend(inflater.decompress(blob[off:off + 128]))
                      except zlib.error as exc:
                          error = str(exc)
                          break

                  try:
                      text = output.decode('utf-8')
                  except UnicodeDecodeError:
                      continue

                  if not text.lstrip().lower().startswith('<!doctype html'):
                      continue
                  if 'function logisticsStats' not in text or 'cartshed:Object.freeze' not in text:
                      continue
                  if 'Phase 2' not in text or '</html>' not in text:
                      continue

                  scripts = re.findall(r'<script(?:\s[^>]*)?>(.*?)</script>', text, flags=re.S | re.I)
                  if not scripts:
                      continue
                  js = '\n'.join(scripts)
                  with tempfile.NamedTemporaryFile('w', suffix='.js', encoding='utf-8', delete=False) as tmp:
                      tmp.write(js)
                      tmp_path = tmp.name
                  check = subprocess.run(['node', '--check', tmp_path], capture_output=True, text=True)
                  Path(tmp_path).unlink(missing_ok=True)
                  if check.returncode != 0:
                      continue

                  complete = text.rstrip().lower().endswith('</html>')
                  valid.append({
                      'pos': pos,
                      'char': char,
                      'text': text,
                      'bytes': len(output),
                      'complete': complete,
                      'error': error,
                      'eof': inflater.eof,
                  })

          if not valid:
              raise SystemExit(f'No structurally valid HTML candidate found after {tested} tests')

          valid.sort(key=lambda item: (item['complete'], item['eof'], item['bytes']), reverse=True)
          best = valid[0]
          Path('index.html').write_text(best['text'], encoding='utf-8', newline='')
          lines = [
              'recovered=true',
              'method=salvage-decompressed-html',
              f'tested_candidates={tested}',
              f'valid_candidates={len(valid)}',
              f'missing_position={best["pos"]}',
              f'missing_character={best["char"]}',
              f'html_bytes={best["bytes"]}',
              f'ends_with_html={best["complete"]}',
              f'inflater_eof={best["eof"]}',
              f'final_error={best["error"]}',
          ]
          for i, item in enumerate(valid[:10], 1):
              lines.append(f'candidate{i}: position={item["pos"]} char={item["char"]} bytes={item["bytes"]} complete={item["complete"]} eof={item["eof"]}')
          Path('.phase2-diagnostic.txt').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          print('\n'.join(lines))
          PY

      - name: Validate recovered game
        shell: bash
        run: |
          set -euo pipefail
          grep -q "function logisticsStats" index.html
          grep -q "cartshed:Object.freeze" index.html
          grep -q "</html>" index.html
          sed -n '/<script>/,/<\/script>/p' index.html | sed '1d;$d' > /tmp/crown-phase2.js
          node --check /tmp/crown-phase2.js

      - name: Commit recovered game
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .phase2-diagnostic.txt
          git commit -m "recover complete phase 2 HTML"
          git push origin HEAD:agent/phase2-logistics
