name: Rebuild playable Phase 2

on:
  pull_request:
    branches:
      - main
    types: [opened, reopened, ready_for_review]

permissions:
  contents: write

jobs:
  rebuild:
    if: github.head_ref == 'agent/phase2-logistics' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase2-logistics
          fetch-depth: 0

      - name: Load rebuild script
        run: git show origin/main:.github/scripts/rebuild_latest.py > /tmp/rebuild_latest.py

      - name: Rebuild latest game
        run: python3 /tmp/rebuild_latest.py

      - name: Remove broken packed payloads
        run: rm -rf .crown-phase2 .crown-packed .phase2-diagnostic.txt .github/workflows/assemble-phase2-logistics.yml

      - name: Validate rebuilt game
        shell: bash
        run: |
          set -euo pipefail
          grep -q "Phase 2 Logistics 0.4.0" index.html
          grep -q "function logisticsStats" index.html
          grep -q "cartshed:Object.freeze" index.html
          grep -q "function drawCarts" index.html
          grep -q "visualViewport" index.html
          sed -n '/<script>/,/<\/script>/p' index.html | sed '1d;$d' > /tmp/crown-latest.js
          node --check /tmp/crown-latest.js
          python3 - <<'PY'
          from pathlib import Path
          text=Path('index.html').read_text(encoding='utf-8')
          assert text.lstrip().lower().startswith('<!doctype html')
          assert text.rstrip().lower().endswith('</html>')
          assert '.crown-packed/' not in text
          assert 'DecompressionStream' not in text
          print('Single-file HTML validation passed')
          PY

      - name: Commit rebuilt latest game
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "rebuild playable phase 2 latest version"
          git push origin HEAD:agent/phase2-logistics
