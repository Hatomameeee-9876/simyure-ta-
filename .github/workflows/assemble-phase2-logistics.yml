name: Assemble Phase 2 logistics

on:
  push:
    branches:
      - agent/phase2-logistics
  pull_request:
    branches:
      - agent/touch-trackpad
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  assemble:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase2-logistics
          fetch-depth: 0
      - name: Assemble index.html
        shell: bash
        run: |
          set -euo pipefail
          cat .crown-phase2/part-*.b64 | base64 --decode | gzip -d > index.html
          grep -q "Phase 2 物流試作 0.4.0" index.html
          grep -q "function logisticsStats" index.html
          grep -q "cartshed:Object.freeze" index.html
          sed -n '/<script>/,/<\/script>/p' index.html | sed '1d;$d' > /tmp/crown-phase2.js
          node --check /tmp/crown-phase2.js
      - name: Commit assembled game
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .crown-phase2 .github/workflows/assemble-phase2-logistics.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "start phase 2 logistics simulation"
          git push origin HEAD:agent/phase2-logistics
