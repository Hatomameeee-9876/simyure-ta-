name: Assemble Phase 2 logistics

on:
  push:
    branches:
      - agent/phase2-logistics
    paths:
      - '.crown-phase2/**'
      - '.github/workflows/assemble-phase2-logistics.yml'

permissions:
  contents: write

jobs:
  assemble:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase2-logistics
          fetch-depth: 0
      - name: Assemble and validate index.html
        shell: bash
        run: |
          set -euo pipefail
          cat .crown-phase2/part-*.b64 | base64 --decode | gzip --decompress > index.html
          grep -q "Phase 2 物流試作 0.4.0" index.html
          grep -q "function logisticsStats" index.html
          grep -q "cartshed:Object.freeze" index.html
          python - <<'PY'
          from pathlib import Path
          import re
          text = Path('index.html').read_text(encoding='utf-8')
          match = re.search(r'<script>(.*)</script>', text, re.S)
          if not match:
              raise SystemExit('script not found')
          Path('/tmp/crown-phase2.js').write_text(match.group(1), encoding='utf-8')
          PY
          node --check /tmp/crown-phase2.js
      - name: Commit Phase 2 start
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .crown-phase2 .github/workflows/assemble-phase2-logistics.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .crown-phase2 .github/workflows/assemble-phase2-logistics.yml
          git commit -m "start phase 2 logistics simulation"
          git push origin HEAD:agent/phase2-logistics
