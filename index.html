<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>辺境の冠</title>
  <style>
    html,body{margin:0;width:100%;height:100%;display:grid;place-items:center;background:#0d1110;color:#f0e5c9;font-family:system-ui,sans-serif}
    p{padding:20px;text-align:center;line-height:1.7}
  </style>
</head>
<body>
  <p>辺境の冠を読み込み中…</p>
  <script src=".crown-packed/p0.js"></script>
  <script src=".crown-packed/p1.js"></script>
  <script src=".crown-packed/p2.js"></script>
  <script>
    (async()=>{
      try{
        const bin=Uint8Array.from(atob(window.__CROWN_GZ||""),c=>c.charCodeAt(0));
        const stream=new Blob([bin]).stream().pipeThrough(new DecompressionStream("gzip"));
        const text=await new Response(stream).text();
        document.open();
        document.write(text);
        document.close();
      }catch(e){
        document.body.innerHTML="<p>読み込みに失敗しました。<br>"+String(e)+"<br>Chrome / Edgeの最新版で開いてください。</p>";
      }
    })();
  </script>
</body>
</html>
